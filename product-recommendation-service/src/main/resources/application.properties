# Server port :
server.port= 8812

# Application name :
spring.application.name= product-recommendation-service

# Client registration properties:
eureka.client.service-url.defaultZone = http://localhost:8761/eureka

# Data source (KẾT NỐI VỚI DB 'product-recommendation' TRÊN LARAGON) :
spring.datasource.url=jdbc:mysql://localhost:3306/product-recommendation?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate :
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true