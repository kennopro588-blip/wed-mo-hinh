# Server port
server.port=8811

# Application name
spring.application.name=user-service

# Eureka Client (Đảm bảo hiện màu xanh trên Eureka)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Data source (KẾT NỐI VỚI DB 'user' TRÊN LARAGON)
spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate (Để Java tự tạo/cập nhật bảng users)
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis (TẠM TẮT ĐỂ TRÁNH LỖI)
spring.session.store-type=none

# Cấu hình Thymeleaf (Để hiển thị giao diện HTML)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html