# Server port :
server.port= 8813

# Application name :
spring.application.name= order-service

# Client registration properties:
eureka.client.service-url.defaultZone = http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Data source (KẾT NỐI VỚI MYSQL TRÊN LARAGON) :
spring.datasource.url=jdbc:mysql://localhost:3306/orders?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# Jpa/Hibernate :
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis (TẠM TẮT) :
spring.session.store-type=none
#spring.session.redis.namespace=session
#spring.redis.host=localhost
#spring.redis.port=6379

